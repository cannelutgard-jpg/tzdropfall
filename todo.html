<html lang="ru">
<head>

<title>DropFall -- ТЗ проекта</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;background-image:radial-gradient(ellipse at 20% 50%,#16213e 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,#16213e 0%,transparent 50%),linear-gradient(180deg,#1a1a2e 0%,#0f0f23 100%);min-height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;padding:20px;color:#c8c8c8;overflow-x:hidden}
.block-deco{position:fixed;opacity:.06;pointer-events:none;z-index:0;border:1px solid rgba(255,255,255,.03)}
.block-grass{width:100px;height:100px;bottom:30px;left:20px;background:linear-gradient(180deg,#5b8731 0%,#5b8731 20%,#8b5e3c 20%,#8b5e3c 100%);clip-path:polygon(0 0,100% 2%,98% 100%,0 98%)}
.block-diamond{width:80px;height:80px;top:120px;right:30px;background:#33e0ff;background-image:linear-gradient(45deg,rgba(255,255,255,.08) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.08) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.08) 75%),linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.08) 75%);background-size:20px 20px;transform:rotate(15deg)}
.block-stone{width:90px;height:90px;bottom:150px;right:60px;background:#7a7a7a;background-image:radial-gradient(circle at 20% 30%,#8a8a8a 2px,transparent 2px),radial-gradient(circle at 70% 60%,#6a6a6a 3px,transparent 3px),radial-gradient(circle at 40% 80%,#8a8a8a 2px,transparent 2px),radial-gradient(circle at 80% 20%,#6a6a6a 2px,transparent 2px);clip-path:polygon(2% 0,100% 0,98% 100%,0 98%);transform:rotate(-10deg)}
.block-dirt{width:70px;height:70px;top:300px;left:10px;background:#6b4226;background-image:radial-gradient(circle at 30% 40%,#7a4f30 3px,transparent 3px),radial-gradient(circle at 60% 70%,#5c3820 2px,transparent 2px);clip-path:polygon(0 3%,97% 0,100% 97%,3% 100%);transform:rotate(8deg)}
.block-gold{width:75px;height:75px;top:480px;right:0;background:#fce94b;background-image:linear-gradient(135deg,rgba(255,255,255,.12) 25%,transparent 25%),linear-gradient(225deg,rgba(255,255,255,.12) 25%,transparent 25%),linear-gradient(315deg,rgba(255,255,255,.12) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.12) 75%);background-size:15px 15px;clip-path:polygon(0 0,100% 4%,96% 100%,4% 96%);transform:rotate(-5deg)}
.block-iron{width:65px;height:65px;top:220px;left:0;background:#c0c0c0;background-image:linear-gradient(135deg,rgba(255,255,255,.1) 25%,transparent 25%),linear-gradient(225deg,rgba(255,255,255,.1) 25%,transparent 25%);background-size:12px 12px;clip-path:polygon(0 2%,98% 0,100% 98%,2% 100%);transform:rotate(20deg)}
.block-emerald{width:60px;height:60px;top:400px;left:5px;background:#2ecc71;background-image:radial-gradient(circle at 30% 40%,rgba(255,255,255,.12) 4px,transparent 4px),radial-gradient(circle at 70% 60%,rgba(255,255,255,.08) 3px,transparent 3px);clip-path:polygon(3% 0,100% 3%,97% 100%,0 97%);transform:rotate(-15deg)}
.block-redstone{width:55px;height:55px;top:580px;right:10px;background:#c33;background-image:radial-gradient(circle at 50% 50%,rgba(255,255,255,.1) 3px,transparent 3px),radial-gradient(circle at 20% 30%,rgba(255,255,255,.07) 2px,transparent 2px);clip-path:polygon(0 0,100% 0,96% 100%,4% 96%);transform:rotate(25deg)}
.block-coal{width:50px;height:50px;top:680px;left:20px;background:#2c2c2c;background-image:radial-gradient(circle at 30% 40%,#3c3c3c 3px,transparent 3px),radial-gradient(circle at 70% 50%,#1c1c1c 2px,transparent 2px);clip-path:polygon(2% 2%,98% 0,100% 98%,0 96%);transform:rotate(-8deg)}
.block-obsidian{width:70px;height:70px;top:750px;right:30px;background:#1a0a2e;background-image:linear-gradient(135deg,rgba(100,50,150,.15) 25%,transparent 25%),linear-gradient(225deg,rgba(100,50,150,.1) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(80,40,120,.12) 75%);background-size:14px 14px;clip-path:polygon(0 0,100% 3%,97% 100%,3% 97%);transform:rotate(12deg)}
.block-netherrack{width:60px;height:60px;top:160px;left:50px;background:#5a1a1a;background-image:radial-gradient(circle at 25% 35%,#7a2a2a 2px,transparent 2px),radial-gradient(circle at 60% 70%,#4a1010 3px,transparent 3px),radial-gradient(circle at 80% 20%,#6a2020 2px,transparent 2px);clip-path:polygon(0 0,100% 2%,98% 100%,2% 98%);transform:rotate(-20deg)}
.block-crafting{width:72px;height:72px;top:620px;left:15px;background:#8b5e3c;background-image:linear-gradient(90deg,rgba(0,0,0,.1) 1px,transparent 1px),linear-gradient(0deg,rgba(0,0,0,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(0deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:18px 18px,18px 18px,9px 9px,9px 9px;clip-path:polygon(0 0,100% 0,100% 100%,0 100%);transform:rotate(-3deg)}
.block-bookshelf{width:66px;height:66px;top:340px;left:30px;background:#6b4226;background-image:linear-gradient(0deg,#8b6e3c 16px,#5a3a1a 16px,#5a3a1a 20px,#6b4226 20px,#6b4226 36px,#8b6e3c 36px,#8b6e3c 40px,#6b4226 40px,#6b4226 56px,#8b6e3c 56px,#8b6e3c 60px,#6b4226 60px);clip-path:polygon(0 0,100% 2%,98% 100%,2% 98%);transform:rotate(7deg)}
.block-tnt{width:80px;height:80px;top:50px;right:80px;background:#c33;border:3px solid #8a1a1a}
.block-tnt::before{content:'TNT';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;font-size:8px;color:#fff;text-shadow:1px 1px 0 #000;white-space:nowrap}
.block-tnt::after{content:'';position:absolute;top:0;left:0;right:0;height:30%;background:#f5e6c8;border-bottom:3px solid #8a1a1a}
.block-glowstone{width:68px;height:68px;bottom:250px;left:5px;background:#e8a820;background-image:radial-gradient(circle at 25% 25%,#ffe060 6px,transparent 6px),radial-gradient(circle at 75% 25%,#ffe060 5px,transparent 5px),radial-gradient(circle at 25% 75%,#ffe060 5px,transparent 5px),radial-gradient(circle at 75% 75%,#ffe060 6px,transparent 6px),radial-gradient(circle at 50% 50%,#c87810 4px,transparent 4px);box-shadow:0 0 15px rgba(255,200,0,.4);transform:rotate(5deg)}
.block-water{width:58px;height:58px;top:900px;right:20px;background:linear-gradient(180deg,#1a6acc 0%,#0a4a9a 60%,#1a6acc 100%);background-size:100% 20px;opacity:.15;transform:rotate(-8deg);border-radius:4px}
.block-leaves{width:74px;height:74px;top:1000px;left:8px;background:#2d7a1a;background-image:radial-gradient(circle at 20% 20%,#3a9a20 4px,transparent 4px),radial-gradient(circle at 60% 40%,#1a5a0a 3px,transparent 3px),radial-gradient(circle at 40% 70%,#3a9a20 4px,transparent 4px),radial-gradient(circle at 80% 80%,#1a5a0a 3px,transparent 3px),radial-gradient(circle at 50% 20%,#2a8a15 3px,transparent 3px);transform:rotate(12deg)}
.block-sand{width:62px;height:62px;bottom:400px;right:5px;background:#e8d48a;background-image:radial-gradient(circle at 30% 40%,#d8c070 2px,transparent 2px),radial-gradient(circle at 70% 30%,#f0dca0 2px,transparent 2px),radial-gradient(circle at 50% 70%,#d8c070 2px,transparent 2px);transform:rotate(-18deg)}
.block-lapis{width:56px;height:56px;top:850px;right:50px;background:#1a3a8a;background-image:radial-gradient(circle at 30% 40%,#2a4aaa 4px,transparent 4px),radial-gradient(circle at 70% 60%,#0a2a6a 3px,transparent 3px);transform:rotate(22deg)}
.block-purpur{width:64px;height:64px;top:1100px;right:15px;background:#6a3a8a;background-image:linear-gradient(45deg,rgba(255,255,255,.06) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.06) 25%,transparent 25%);background-size:16px 16px;transform:rotate(-6deg)}
.block-sponge{width:70px;height:70px;top:1200px;left:12px;background:#c8b820;background-image:radial-gradient(circle at 20% 20%,rgba(0,0,0,.15) 5px,transparent 5px),radial-gradient(circle at 60% 20%,rgba(0,0,0,.15) 5px,transparent 5px),radial-gradient(circle at 40% 50%,rgba(0,0,0,.15) 5px,transparent 5px),radial-gradient(circle at 80% 60%,rgba(0,0,0,.15) 5px,transparent 5px),radial-gradient(circle at 20% 80%,rgba(0,0,0,.15) 5px,transparent 5px),radial-gradient(circle at 70% 85%,rgba(0,0,0,.15) 5px,transparent 5px);transform:rotate(10deg)}
.steve-bg{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:0;pointer-events:none;opacity:.13;width:520px;height:650px}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);pointer-events:none;z-index:0}
.container{max-width:900px;margin:0 auto;position:relative;z-index:1}
.header{text-align:center;margin-bottom:30px;padding:30px 20px;background:linear-gradient(180deg,rgba(50,50,80,.6) 0%,rgba(30,30,50,.4) 100%);border:2px solid #3a3a5c;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 0 40px rgba(100,100,180,.05);position:relative}
.header h1{font-family:'Press Start 2P',monospace;font-size:20px;color:#6bff6b;text-shadow:0 0 10px rgba(107,255,107,.3),0 2px 4px rgba(0,0,0,.5);letter-spacing:2px}
.header .subtitle{font-family:'Comic Sans MS','Comic Sans',cursive;color:#ffaa00;font-size:16px;margin-top:10px;letter-spacing:.5px;text-shadow:0 0 8px rgba(255,170,0,.15)}
.header .counters{display:flex;justify-content:center;gap:30px;margin-top:15px;font-size:13px}
.header .counters span{background:rgba(0,0,0,.3);padding:4px 14px;border-radius:4px;border:1px solid #3a3a5c}
.header .counters .done{color:#6bff6b}
.header .counters .total{color:#ffaa00}
.history-btn{position:absolute;top:12px;right:12px;background:rgba(40,40,80,.5);border:1px solid #4a4a7a;border-radius:4px;padding:6px 12px;color:#8a8aba;font:inherit;font-size:12px;cursor:pointer}
.history-btn:hover{background:rgba(60,60,120,.5);border-color:#6a6a9a;color:#aaaada}
.history-btn.active{border-color:#ffaa00;color:#ffaa00;background:rgba(80,60,20,.3)}
.section{background:linear-gradient(180deg,rgba(40,40,65,.7) 0%,rgba(25,25,40,.7) 100%);border:1px solid #3a3a5c;border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.section:hover{border-color:#5a5a8a}
.section-header{display:flex;align-items:center;padding:12px 16px;background:linear-gradient(90deg,rgba(50,50,80,.5) 0%,transparent 100%);border-bottom:1px solid #2a2a45;gap:10px}
.section-header .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(0,0,0,.3);border:1px solid #4a4a6a;border-radius:4px;flex-shrink:0;cursor:pointer;position:relative}
.section-header .icon:hover{border-color:#8a8aba;background:rgba(80,80,120,.3)}
.emoji-picker{position:absolute;top:100%;left:0;margin-top:6px;background:#2a2a45;border:1px solid #4a4a6a;border-radius:6px;padding:8px;display:grid;grid-template-columns:repeat(8,1fr);gap:2px;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.6);min-width:220px}
.emoji-picker button{background:none;border:none;font-size:18px;padding:4px;cursor:pointer;border-radius:3px;text-align:center}
.emoji-picker button:hover{background:rgba(100,100,180,.3)}
.section-header .title-group{flex:1;min-width:0}
.section-header .section-title{color:#ffaa00;font-weight:600;font-size:14px;letter-spacing:.5px;cursor:pointer;padding:2px 4px;border-radius:3px;display:inline-block}
.section-header .section-title:hover{background:rgba(255,170,0,.08)}
.section-header .section-title-input{background:rgba(0,0,0,.4);border:1px solid #ffaa00;border-radius:3px;padding:2px 8px;color:#ffaa00;font-family:inherit;font-size:14px;font-weight:600;outline:none;width:100%;max-width:300px}
.section-header .section-subtitle{color:#6a6a8a;font-size:11px;margin-top:2px}
.section-header .section-count{font-size:12px;color:#5a5a7a;background:rgba(0,0,0,.3);padding:2px 10px;border-radius:10px;border:1px solid #3a3a5c;flex-shrink:0}
.add-btn{width:28px;height:28px;border:1px solid #4a6a4a;border-radius:4px;background:rgba(40,80,40,.3);color:#6bff6b;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-btn:hover{background:rgba(60,120,60,.4);border-color:#6bff6b;box-shadow:0 0 10px rgba(107,255,107,.15)}
.section-actions{display:flex;gap:4px;flex-shrink:0;opacity:0}
.section:hover .section-actions{opacity:1}
.section-del-btn,.section-move-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 6px;border-radius:3px;color:#5a5a7a;line-height:1}
.section-move-btn:hover{background:rgba(100,100,180,.2);color:#8a8aba}
.section-del-btn:hover{background:rgba(180,60,60,.2);color:#ff6b6b}
.task-list{list-style:none;padding:4px 0}
.task-item{display:flex;align-items:flex-start;padding:10px 16px;gap:10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03)}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:rgba(255,255,255,.03)}
.task-check{width:18px;height:18px;border:2px solid #5a5a7a;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}
.task-item.done .task-check{border-color:#4a8a4a;background:rgba(60,120,60,.3)}
.task-item.done .task-check::after{content:'✔';color:#6bff6b;font-size:11px}
.task-text{flex:1;font-size:13.5px;line-height:1.5;color:#d0d0e0;min-height:22px;word-break:break-word}
.task-item.done .task-text{color:#5a5a7a;text-decoration:line-through}
.task-text.edit-mode{background:rgba(0,0,0,.3);border:1px solid #5a5a8a;border-radius:3px;padding:2px 6px;outline:none;color:#fff;font-family:inherit;font-size:inherit;line-height:inherit;width:100%;resize:vertical}
.task-text.edit-mode:focus{border-color:#8a8aba;box-shadow:0 0 8px rgba(100,100,180,.2)}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0}
.task-item:hover .task-actions{opacity:1}
.task-edit-btn,.task-delete-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:3px;color:#5a5a7a}
.task-edit-btn:hover{background:rgba(100,100,180,.2);color:#8a8aba}
.task-delete-btn:hover{background:rgba(180,60,60,.2);color:#ff6b6b}
.new-task-form{display:flex;align-items:center;padding:10px 16px;gap:10px;border-top:1px dashed #2a2a45}
.new-task-form.hidden{display:none}
.new-task-input{flex:1;background:rgba(0,0,0,.3);border:1px solid #3a3a5c;border-radius:4px;padding:8px 12px;color:#d0d0e0;font-family:inherit;font-size:13px;outline:none}
.new-task-input:focus{border-color:#6a6a9a;box-shadow:0 0 8px rgba(100,100,180,.15)}
.new-task-input::placeholder{color:#4a4a6a}
.save-btn{background:linear-gradient(180deg,rgba(60,120,60,.4) 0%,rgba(40,80,40,.4) 100%);border:1px solid #4a7a4a;border-radius:4px;padding:8px 16px;color:#8aff8a;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.save-btn:hover{background:rgba(60,120,60,.6);border-color:#6bff6b;box-shadow:0 0 10px rgba(107,255,107,.15)}
.cancel-btn{background:rgba(80,40,40,.3);border:1px solid #6a4a4a;border-radius:4px;padding:8px 12px;color:#ff8a8a;font-size:13px;cursor:pointer;font-family:inherit}
.cancel-btn:hover{background:rgba(120,40,40,.4);border-color:#ff6b6b}
.add-section-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:rgba(40,40,65,.4);border:2px dashed #3a3a5c;border-radius:8px;color:#5a5a8a;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.add-section-btn:hover{border-color:#5a5a8a;color:#8a8aba;background:rgba(50,50,80,.4)}
.new-section-form{background:linear-gradient(180deg,rgba(40,40,65,.7) 0%,rgba(25,25,40,.7) 100%);border:1px solid #ffaa00;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 0 20px rgba(255,170,0,.05)}
.new-section-form.hidden{display:none}
.new-section-form label{display:block;font-size:12px;color:#6a6a8a;margin-bottom:4px;margin-top:10px}
.new-section-form label:first-child{margin-top:0}
.new-section-form input,.new-section-form select{width:100%;background:rgba(0,0,0,.3);border:1px solid #3a3a5c;border-radius:4px;padding:8px 12px;color:#d0d0e0;font-family:inherit;font-size:13px;outline:none}
.new-section-form input:focus,.new-section-form select:focus{border-color:#6a6a9a}
.new-section-form .form-btns{display:flex;gap:8px;margin-top:14px}
.new-section-form .form-btns button{flex:1;padding:8px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px}
.status-bar{text-align:center;padding:8px;font-size:12px;color:#4a4a6a;margin-bottom:10px}
.status-bar.synced{color:#4a7a4a}
.status-bar.saving{color:#ffaa00}
.status-bar.offline{color:#8a4a4a}
.history-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;backdrop-filter:blur(2px)}
.history-overlay.open{display:block}
.history-panel{position:fixed;top:0;right:0;width:400px;max-width:100vw;height:100%;background:#1a1a2e;border-left:2px solid #3a3a5c;z-index:101;display:none;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.6)}
.history-panel.open{display:flex}
.history-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #2a2a45;background:linear-gradient(180deg,rgba(50,50,80,.4) 0%,transparent 100%)}
.history-panel-header h2{font-size:14px;color:#ffaa00;font-weight:600}
.history-clear-all-btn{background:rgba(180,60,60,.15);border:1px solid #6a3a3a;border-radius:3px;padding:4px 10px;color:#ff6b6b;font-size:11px;cursor:pointer;font-family:inherit}
.history-clear-all-btn:hover{background:rgba(180,60,60,.3);border-color:#ff6b6b}
.history-close-btn{background:none;border:none;color:#6a6a8a;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:3px}
.history-close-btn:hover{color:#ff6b6b;background:rgba(180,60,60,.15)}
.history-list{flex:1;overflow-y:auto;padding:4px 0}
.history-item{display:flex;align-items:flex-start;padding:10px 12px;gap:8px;border-bottom:1px solid rgba(255,255,255,.03)}
.history-item:hover{background:rgba(255,255,255,.03)}
.history-item .h-icon{font-size:14px;margin-top:1px;flex-shrink:0;width:22px;text-align:center}
.history-item .h-info{flex:1;min-width:0}
.history-item .h-desc{font-size:13px;color:#c8c8d8;word-break:break-word;line-height:1.4}
.history-item .h-time{font-size:11px;color:#5a5a7a;margin-top:3px}
.history-item .h-actions{display:flex;gap:4px;flex-shrink:0;opacity:.4}
.history-item:hover .h-actions{opacity:1}
.history-del-btn,.history-restore-btn{background:none;border:1px solid transparent;border-radius:3px;cursor:pointer;font-size:12px;padding:3px 8px;font-family:inherit}
.history-restore-btn{color:#8aff8a;background:rgba(60,120,60,.15);border-color:#3a6a3a}
.history-restore-btn:hover{background:rgba(60,120,60,.35);border-color:#6bff6b}
.history-del-btn{color:#ff6b6b;background:rgba(120,40,40,.15);border-color:#6a3a3a}
.history-del-btn:hover{background:rgba(180,60,60,.25);border-color:#ff6b6b}
.history-empty{padding:40px 16px;text-align:center;color:#4a4a6a;font-size:13px;line-height:1.8}
.mc-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mc-overlay.open{display:flex}
.mc-box{background:linear-gradient(180deg,#2a2a45 0%,#1a1a30 100%);border:2px solid #ffaa00;border-radius:8px;padding:24px;max-width:340px;width:90%;box-shadow:0 0 40px rgba(255,170,0,.15),0 8px 40px rgba(0,0,0,.8);text-align:center}

<script>
var E=[],EMOJIS=['🏠','⚙️','💰','🎭','⚔️','🛡️','🎨','🌍','🔮','📦','🏰','🌲','🔥','💎','🗡️','🛠️','🧪','📜','⭐','👑','🐉','🧟','🏹','🧭','🚀','🎯','🧩','🎲','📊','🔧'];
var cfg={apiKey:"AIzaSyCUdNt-d56Sa0kYohp9OPAO41OtCXwQBJU",authDomain:"tzdropfall.firebaseapp.com",databaseURL:"https://tzdropfall-default-rtdb.firebaseio.com",projectId:"tzdropfall",storageBucket:"tzdropfall.firebasestorage.app",messagingSenderId:"96951691270",appId:"1:96951691270:web:4e0f26b87277c210f93b87"};
firebase.initializeApp(cfg);
var db=firebase.database(),dataRef=db.ref('todo'),histRef=db.ref('todo_history');
var D0=[{icon:'🏠',title:'Спавн и мир',subtitle:'Телепорты, дома, территории',tasks:['Решить: переносить спавн в отдельный мир или нет','После телепорта — эффект скорости? или слепота/тошнота?','Механика возвращения на спавн','Покупка домов + /home с ценой, КД и ожиданием ТП']},{icon:'⚙️',title:'Игровая механика',subtitle:'Таланты, скилы, инвентарь',tasks:['Ветка талантов — проверить, починить баги','Скилы + посохи — разобраться, что к чему','Уменьшить базовый инвентарь? Разблокировка слотов недорого']},{icon:'💰',title:'Экономика',subtitle:'Заработок, магазины, лут',tasks:['Система оплаты за убийство мобов','Продажа лута — где, как, цены','Билеты на данжи — покупка, активация, 20 сек ожидания, ТП в другой мир']},{icon:'🎭',title:'NPC и квесты',subtitle:'Обучение, торговцы, задания',tasks:['Кастомные NPC: обучение игре','Квесты от NPC','Торговцы с кастомным ассортиментом']},{icon:'⚔️',title:'Данжи и боссы',subtitle:'Подземелья, боссы, лути',tasks:['Создание данжей (отдельный мир)','Боссы с кастомным лутом','Конфигурируемый лут — мобильный при вайпе','Билеты на данж: покупка → ожидание 20 сек → ТП']},{icon:'🛡️',title:'Безопасность',subtitle:'Антибот, спавн новичков',tasks:['Капча при входе (защита от ботов)','Проверить AuthMe — spawn новичков','Отключить установку спавнточки кроватью (NoBedRespawn)']},{icon:'🎨',title:'Кастомизация',subtitle:'Скины, модельки, внешность',tasks:['HD скины — нужны?','Кастомные модели игроков?','Возможно: система скинов/косметики']}];
var data=[],historyLog=[],emojiOpen=null,restoring=false;

function st(s,m){var e=document.getElementById('statusBar');e.className='status-bar '+s;e.textContent=m}
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function fmt(ts){var d=new Date(ts);return d.toLocaleDateString()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}
function norm(d){for(var i=0;i<d.length;i++){if(!Array.isArray(d[i].tasks))d[i].tasks=[];for(var j=0;j<d[i].tasks.length;j++){if(typeof d[i].tasks[j]==='object'&&d[i].tasks[j]&&typeof d[i].tasks[j].text!='string')d[i].tasks[j].text='';else if(typeof d[i].tasks[j]!=='string'&&(typeof d[i].tasks[j]!=='object'||d[i].tasks[j]===null))d[i].tasks[j]=''}}return d}

function R(){
  var a=document.getElementById('app'),t=0,d=0,h='';
  for(var si=0;si<data.length;si++){
    var s=data[si],tk=s.tasks||[],sd=0;
    for(var i=0;i<tk.length;i++){if(typeof tk[i]==='object'&&tk[i].done)sd++}
    t+=tk.length;d+=sd;
    var ic=s.icon||'📋',ti=esc(s.title),sb=esc(s.subtitle||'');
    h+='<div class="section" data-section="'+si+'"><div class="section-header"><div class="icon" onclick="toggleEmojiPicker('+si+')">'+ic+'</div><div class="title-group"><div class="section-title" onclick="renameSection('+si+')" id="st-'+si+'">'+ti+'</div>';
    if(sb)h+='<div class="section-subtitle">'+sb+'</div>';
    h+='</div><span class="section-count">'+sd+'/'+tk.length+'</span><div class="section-actions"><button class="section-move-btn" onclick="event.stopPropagation();moveSection('+si+',-1)">▲</button><button class="section-move-btn" onclick="event.stopPropagation();moveSection('+si+',1)">▼</button><button class="section-del-btn" onclick="event.stopPropagation();deleteSection('+si+')">✕</button></div><button class="add-btn" onclick="addTask('+si+')">+</button></div><ul class="task-list">';
    for(var tii=0;tii<tk.length;tii++){
      var tsk=tk[tii],tx=typeof tsk==='string'?tsk:tsk.text,dn=typeof tsk==='object'&&tsk.done;
      h+='<li class="task-item'+(dn?' done':'')+'" data-si="'+si+'" data-ti="'+tii+'"><div class="task-check" onclick="toggleTask('+si+','+tii+')"></div><div class="task-text" onclick="toggleTask('+si+','+tii+')">'+esc(tx||'')+'</div><div class="task-actions"><button class="task-edit-btn" onclick="event.stopPropagation();editTask('+si+','+tii+')">✎</button><button class="task-delete-btn" onclick="event.stopPropagation();deleteTask('+si+','+tii+')">✕</button></div></li>';
    }
    h+='</ul><div class="new-task-form hidden" id="nf-'+si+'"><input class="new-task-input" id="ni-'+si+'" placeholder="Новая задача..." maxlength="300"><button class="save-btn" onclick="saveNewTask('+si+')">+ Добавить</button><button class="cancel-btn" onclick="cancelNewTask('+si+')">Отмена</button></div></div>';
  }
  h+='<button class="add-section-btn" onclick="showNewSectionForm()">＋ Добавить раздел</button><div class="new-section-form hidden" id="nsf"><label>Название раздела</label><input id="nsT" placeholder="Например: Магия" maxlength="60"><label>Иконка</label><select id="nsI" style="margin-bottom:4px">';
  for(var e=0;e<EMOJIS.length;e++)h+='<option value="'+EMOJIS[e]+'">'+EMOJIS[e]+'</option>';
  h+='</select><input id="nsIC" placeholder="Или свой эмодзи..." maxlength="4" style="margin-top:4px"><label>Подзаголовок</label><input id="nsS" placeholder="Например: Заклинания, алхимия, артефакты" maxlength="80"><div class="form-btns"><button class="save-btn" onclick="saveNewSection()">Создать</button><button class="cancel-btn" onclick="hideNewSectionForm()">Отмена</button></div></div>';
  a.innerHTML=h;
  document.getElementById('doneCount').textContent=d;
  document.getElementById('totalCount').textContent=t;
  st('synced','✔ Синхронизировано');
}

function descCh(d,p){
  if(!p||!p.length)return'📝 Изменение';
  try{
    for(var si=0;si<Math.max(d.length,p.length);si++){
      if(!d[si]||!p[si])return d.length>p.length?'➕ Добавлен раздел: «'+d[d.length-1].title+'»':'✖ Удалён раздел';
      if(d[si].icon!==p[si].icon)return'🔄 Иконка: '+d[si].title;
      if(d[si].title!==p[si].title)return'✏️ Раздел: «'+p[si].title+'» → «'+d[si].title+'»';
      var pt=p[si].tasks||[],ct=d[si].tasks||[];
      if(ct.length>pt.length){var ad=typeof ct[ct.length-1]==='string'?ct[ct.length-1]:ct[ct.length-1].text;return'➕ Задача: «'+ad.substring(0,50)+'»'}
      if(ct.length<pt.length)return'✖ Задача из «'+d[si].title+'» удалена';
      for(var ti=0;ti<ct.length;ti++){
        var cs=typeof ct[ti]==='string'?ct[ti]:(ct[ti]?ct[ti].text:''),ps=typeof pt[ti]==='string'?pt[ti]:(pt[ti]?pt[ti].text:'');
        var cd=typeof ct[ti]==='object'&&ct[ti]&&ct[ti].done,pd=typeof pt[ti]==='object'&&pt[ti]&&pt[ti].done;
        if(cs!==ps)return'✏️ Задача изменена: «'+String(ps||'').substring(0,50)+'»';
        if(cd!==pd)return cd?'✅ '+(cs||'').substring(0,50):'↩️ '+(cs||'').substring(0,50);
      }
    }
    return d.length>p.length?'➕ Добавлен раздел':p.length>d.length?'✖ Удалён раздел':'🔄 Порядок разделов'
  }catch(e){return'📝 Изменение'}
}

function push(d,desc){
  st('saving','💾 Сохранение...');
  var prev=JSON.parse(JSON.stringify(data));
  dataRef.set(d,function(err){
    if(err){st('offline','✖ Ошибка сохранения');return}
    st('synced','✔ Синхронизировано');
    if(!restoring)histRef.push({data:JSON.parse(JSON.stringify(d)),description:desc||descCh(d,prev),timestamp:Date.now()});
  });
}

function toggleTask(si,ti){try{var d=JSON.parse(JSON.stringify(data)),t=d[si].tasks[ti];if(!t)return;if(typeof t==='string')d[si].tasks[ti]={text:t,done:true};else t.done=!t.done;push(d)}catch(e){}}

function editTask(si,ti){
  if(!data[si]||!data[si].tasks||!data[si].tasks[ti])return;
  var tsk=data[si].tasks[ti],tx=typeof tsk==='string'?tsk:(tsk.text||'');
  var els=document.querySelectorAll('.task-item[data-si="'+si+'"][data-ti="'+ti+'"]');
  if(!els.length)return;
  var el=els[0].querySelector('.task-text');if(!el)return;
  el.contentEditable=true;el.classList.add('edit-mode');el.focus();
  var r=document.createRange();r.selectNodeContents(el);
  var s=window.getSelection();s.removeAllRanges();s.addRange(r);
  function sv(){el.contentEditable=false;el.classList.remove('edit-mode');var n=(el.textContent||'').trim();if(n&&n!==tx){var nd=JSON.parse(JSON.stringify(data)),t=nd[si].tasks[ti];if(typeof t==='string')nd[si].tasks[ti]=n;else if(t)t.text=n;push(nd)}else R()}
  el.addEventListener('blur',sv,{once:true});
  el.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();el.blur()}if(e.key==='Escape')R()});
}

function deleteTask(si,ti){try{var d=JSON.parse(JSON.stringify(data));if(!d[si]||!d[si].tasks)return;d[si].tasks.splice(ti,1);push(d)}catch(e){}}
function addTask(si){var e=document.getElementById('nf-'+si);if(e)e.classList.remove('hidden');var i=document.getElementById('ni-'+si);if(i)i.focus()}
function cancelNewTask(si){var e=document.getElementById('nf-'+si);if(e)e.classList.add('hidden');var i=document.getElementById('ni-'+si);if(i)i.value=''}

function saveNewTask(si){
  var inp=document.getElementById('ni-'+si);if(!inp)return;
  var t=inp.value.trim();if(!t)return;
  try{
    var d=JSON.parse(JSON.stringify(data));if(!d[si]){R();return}
    if(!Array.isArray(d[si].tasks))d[si].tasks=[];
    d[si].tasks.push(t);push(d);
    inp.value='';document.getElementById('nf-'+si).classList.add('hidden');
  }catch(e){}
}

function toggleEmojiPicker(si){
  if(emojiOpen===si){emojiOpen=null;R();return}
  emojiOpen=si;R();
  if(emojiOpen!==null){
    var el=document.querySelector('.section[data-section="'+si+'"] .icon');if(!el)return;
    var p=document.createElement('div');p.className='emoji-picker';
    for(var i=0;i<EMOJIS.length;i++)(function(e){var b=document.createElement('button');b.textContent=e;b.onclick=function(ev){ev.stopPropagation();setEmoji(si,e)};p.appendChild(b)})(EMOJIS[i]);
    el.appendChild(p);
    setTimeout(function(){document.addEventListener('click',function cl(e){if(!e.target.closest('.emoji-picker')&&!e.target.closest('.icon')){emojiOpen=null;R()}else setTimeout(function(){document.addEventListener('click',cl,{once:true})},0)},{once:true})},0)
  }
}

function setEmoji(si,e){var d=JSON.parse(JSON.stringify(data));if(!d[si])return;d[si].icon=e;push(d)}

function renameSection(si){
  if(!data[si])return;var cur=data[si].title,el=document.getElementById('st-'+si);if(!el)return;
  var inp=document.createElement('input');inp.className='section-title-input';inp.value=cur;inp.maxLength=60;
  el.replaceWith(inp);inp.focus();inp.select();
  function sv(){var v=inp.value.trim();if(v){var nd=JSON.parse(JSON.stringify(data));nd[si].title=v;push(nd)}else R()}
  inp.addEventListener('blur',sv,{once:true});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();inp.blur()}if(e.key==='Escape')R()});
}

function deleteSection(si){var d=JSON.parse(JSON.stringify(data));if(d.length<=1)return;d.splice(si,1);push(d)}
function moveSection(si,dir){var d=JSON.parse(JSON.stringify(data)),ni=si+dir;if(ni<0||ni>=d.length)return;var t=d[si];d[si]=d[ni];d[ni]=t;push(d)}
function showNewSectionForm(){document.getElementById('nsf').classList.remove('hidden');document.getElementById('nsT').focus()}
function hideNewSectionForm(){document.getElementById('nsf').classList.add('hidden')}

function saveNewSection(){
  var t=document.getElementById('nsT').value.trim();if(!t)return;
  var ic=document.getElementById('nsIC').value.trim(),icon=ic||document.getElementById('nsI').value,sb=document.getElementById('nsS').value.trim();
  try{
    var d=JSON.parse(JSON.stringify(data));d.push({icon:icon,title:t,subtitle:sb||'Новый раздел',tasks:[]});push(d,'➕ Добавлен раздел: «'+t+'»');
    hideNewSectionForm();document.getElementById('nsT').value='';document.getElementById('nsIC').value='';document.getElementById('nsS').value=''
  }catch(e){}
}

function toggleHistory(){var p=document.getElementById('historyPanel'),o=document.getElementById('historyOverlay');if(p.classList.contains('open')){closeHistory();return}p.classList.add('open');o.classList.add('open');document.getElementById('historyBtn').classList.add('active');renderHistory()}
function closeHistory(){document.getElementById('historyPanel').classList.remove('open');document.getElementById('historyOverlay').classList.remove('open');document.getElementById('historyBtn').classList.remove('active')}

function renderHistory(){
  var list=document.getElementById('historyList');
  if(!historyLog.length){list.innerHTML='<div class="history-empty">📭 История пока пуста.<br><br>Все изменения будут сохраняться здесь автоматически.<br><br>Вы можете:<br>🔄 Нажать «Откатить» — вернуть данные к этому моменту<br>✖ Нажать «Удалить» — убрать запись из истории<br>🗑 «Очистить всё» — удалить всю историю</div>';return}
  var html='',sorted=historyLog.slice().sort(function(a,b){return b.timestamp-a.timestamp});
  for(var i=0;i<sorted.length;i++){
    var e=sorted[i],desc=esc(e.description||'📝 Изменение'),time=fmt(e.timestamp);
    var icon='📝';if(e.description){var f=e.description.substring(0,2);if('➕✖✏️🔄✅↩️⏪'.indexOf(f)>=0)icon=f}
    html+='<div class="history-item"><div class="h-icon">'+icon+'</div><div class="h-info"><div class="h-desc">'+desc+'</div><div class="h-time">🕐 '+time+'</div></div><div class="h-actions"><button class="history-restore-btn" onclick="event.stopPropagation();restoreHistory(\''+e._key+'\')">↩ Откатить</button><button class="history-del-btn" onclick="event.stopPropagation();deleteHistoryEntry(\''+e._key+'\')">✖</button></div></div>'
  }
  list.innerHTML=html
}

function mcConfirm(icon,msg,okLabel,fn){
  document.getElementById('mcIcon').textContent=icon;
  document.getElementById('mcMsg').textContent=msg;
  document.getElementById('mcOk').textContent=okLabel||'Подтвердить';
  document.getElementById('mcOverlay').classList.add('open');
  var ok=document.getElementById('mcOk'),cl=document.getElementById('mcCancel');
  function done(res){document.getElementById('mcOverlay').classList.remove('open');ok.onclick=null;cl.onclick=null;if(res)fn()}
  ok.onclick=function(){done(true)};cl.onclick=function(){done(false)};
}

function restoreHistory(key){
  mcConfirm('⏪','Откатить данные к этому моменту? Текущие изменения будут заменены.','Откатить',function(){
    var e=null;for(var i=0;i<historyLog.length;i++){if(historyLog[i]._key===key){e=historyLog[i];break}}
    if(!e)return;restoring=true;
    var d=JSON.parse(JSON.stringify(e.data));d=norm(d);
    dataRef.set(d,function(err){
      restoring=false;
      if(!err){
        data=norm(JSON.parse(JSON.stringify(d)));
        R();
        histRef.push({data:JSON.parse(JSON.stringify(d)),description:'⏪ Откат к: '+(e.description||''),timestamp:Date.now()},function(){
          closeHistory();
        });
      }
    });
  });
}

function deleteHistoryEntry(key){
  mcConfirm('🗑','Удалить эту запись из истории?','Удалить',function(){
    histRef.child(key).remove(function(){
      historyLog=historyLog.filter(function(e){return e._key!==key});
      renderHistory();
    });
  });
}
function clearAllHistory(){
  mcConfirm('🗑','Очистить всю историю? Это действие нельзя отменить.','Очистить всё',function(){
    histRef.remove(function(){
      historyLog=[];
      renderHistory();
    });
  });
}

dataRef.on('value',function(sn){
  var v=sn.val();
  if(v&&Array.isArray(v))data=norm(v);
  else if(v===null){data=JSON.parse(JSON.stringify(D0));dataRef.set(data)}
  else{data=JSON.parse(JSON.stringify(D0));dataRef.set(data)}
  R()
},function(){st('offline','✖ Ошибка подключения к Firebase');data=JSON.parse(JSON.stringify(D0));R()});

histRef.on('value',function(sn){
  var v=sn.val();historyLog=[];
  if(v){var ks=Object.keys(v);for(var i=0;i<ks.length;i++){var e=v[ks[i]];e._key=ks[i];historyLog.push(e)}}
  if(document.getElementById('historyPanel').classList.contains('open'))renderHistory()
});
</script>
</body>
